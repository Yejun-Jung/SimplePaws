services:
  mysql:
    image: mysql:8.0
    container_name: simplepaws-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-simplepawsdb}
      MYSQL_USER: ${MYSQL_USER:-pawsuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pawspass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-rootpass}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: simplepaws-back
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # mysql 주소를 컨테이너 이름인 simplepaws-mysql로 맞췄습니다.
      SPRING_DATASOURCE_URL: jdbc:mysql://simplepaws-mysql:3306/${MYSQL_DATABASE:-simplepawsdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-pawsuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-pawspass}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5174}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      GRADLE_USER_HOME: /root/.gradle
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/app
      - gradle_cache:/root/.gradle
      - /app/build
      - /app/.gradle
    healthcheck:
      # 경로를 /members에서 /health로 변경했습니다. (HealthCheckController 추가 필요)
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: simplepaws-front
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  gradle_cache: